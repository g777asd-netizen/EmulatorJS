<!DOCTYPE html>
<html>
<head>
    <title>PS1 Game</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        EJS_player = '#game';
        EJS_core = 'psx';
        
        // 1. (الحل الجذري) استخدام UNPKG
        // الرابط ده بيجيب "النسخة المجهزة" مش كود المصدر
        EJS_pathtodata = 'https://unpkg.com/emulatorjs@latest/data/';
        
        // 2. رابط لعبة خفيفة جداً (Magic Floor)
        EJS_gameUrl = 'https://raw.githubusercontent.com/asia-se/psx-homebrew/master/Magic_Floor/Magic_Floor.bin';
        
        // 3. البيوس (من مصدر خارجي)
        EJS_biosUrl = 'https://raw.githubusercontent.com/Abdurazaaqmohammed/EmulatorJS/main/data/bios/scph1001.bin';
    </script>
    
    <!-- تشغيل المحرك من UNPKG -->
    <script src="https://unpkg.com/emulatorjs@latest/data/loader.js"></script>
</body>
</html>
