<!DOCTYPE html>
<html>
<head>
    <title>PS1 Game</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        EJS_player = '#game';
        EJS_core = 'psx';
        
        // 1. (التغيير الجذري) استخدام السيرفر الرسمي المستقر
        // ده أسرع وأضمن سيرفر في العالم للمحاكي ده
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        
        // 2. رابط لعبة Magic Floor (صغيرة جداً للتجربة)
        EJS_gameUrl = 'https://raw.githubusercontent.com/asia-se/psx-homebrew/master/Magic_Floor/Magic_Floor.bin';
        
        // 3. البيوس (من مصدر خارجي مضمون)
        EJS_biosUrl = 'https://raw.githubusercontent.com/Abdurazaaqmohammed/EmulatorJS/main/data/bios/scph1001.bin';
    </script>
    
    <!-- تشغيل المحرك من السيرفر الرسمي -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
